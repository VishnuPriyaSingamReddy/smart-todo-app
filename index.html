<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart To-Do List</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(-45deg,#667eea,#764ba2,#ff7eb3,#42e695,#f9d423);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:700px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
color:white;
}

h1{
text-align:center;
margin-bottom:10px;
}

.inputBox{
display:flex;
gap:8px;
margin-bottom:15px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00c9a7;
color:white;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.weekDay{
margin-top:15px;
padding:10px;
background:rgba(255,255,255,0.15);
border-radius:10px;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.25);
padding:8px;
border-radius:6px;
margin-top:6px;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.deleteBtn{
background:#ff4d6d;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.progress{
height:8px;
background:rgba(255,255,255,0.3);
border-radius:5px;
margin-top:15px;
}

.progressBar{
height:8px;
background:#00ffae;
width:0%;
border-radius:5px;
transition:0.4s;
}

.counter{
margin-top:6px;
font-size:14px;
}

.chartBox{
margin-top:25px;
}

</style>

</head>

<body>

<div class="container">

<h1>Smart To-Do List</h1>

<div class="inputBox">

<input id="taskInput" placeholder="Enter your task">

<input type="date" id="taskDate">

<button onclick="addTask()">Add</button>

</div>

<div class="progress">
<div class="progressBar" id="progressBar"></div>
</div>

<div class="counter" id="taskCounter"></div>

<div id="weekView"></div>

<div class="chartBox">
<h3>Weekly Productivity</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask(){

let text=document.getElementById("taskInput").value;
let date=document.getElementById("taskDate").value;

if(text==="") return;

tasks.push({
text,
date,
completed:false
});

save();
display();

document.getElementById("taskInput").value="";
}

function toggle(i){

tasks[i].completed=!tasks[i].completed;

save();
display();
}

function del(i){

tasks.splice(i,1);

save();
display();
}

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks));

}

function updateProgress(){

let done=tasks.filter(t=>t.completed).length;

let percent=tasks.length?done/tasks.length*100:0;

document.getElementById("progressBar").style.width=percent+"%";

document.getElementById("taskCounter").innerText=
done+" / "+tasks.length+" tasks completed";

}

function display(){

let container=document.getElementById("weekView");

container.innerHTML="";

let days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let today=new Date();

let start=new Date(today);

start.setDate(today.getDate()-today.getDay());

for(let i=0;i<7;i++){

let date=new Date(start);

date.setDate(start.getDate()+i);

let dateStr=date.toISOString().split("T")[0];

let dayBox=document.createElement("div");

dayBox.className="weekDay";

dayBox.innerHTML="<h3>"+days[i]+" ("+dateStr+")</h3>";

tasks.forEach((t,index)=>{

if(t.date===dateStr){

let task=document.createElement("div");

task.className="task";

let left=document.createElement("div");

let check=document.createElement("input");

check.type="checkbox";

check.checked=t.completed;

check.onclick=()=>toggle(index);

let span=document.createElement("span");

span.innerHTML=" "+t.text;

if(t.completed) span.classList.add("completed");

left.appendChild(check);

left.appendChild(span);

let delBtn=document.createElement("button");

delBtn.innerText="Delete";

delBtn.className="deleteBtn";

delBtn.onclick=()=>del(index);

task.appendChild(left);

task.appendChild(delBtn);

dayBox.appendChild(task);

}

});

container.appendChild(dayBox);

}

updateProgress();
renderChart();

}

let chart;

function renderChart(){

let data=[0,0,0,0,0,0,0];

tasks.forEach(t=>{
if(t.completed && t.date){
let day=new Date(t.date).getDay();
data[day]++;
}
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
datasets:[{
label:"Completed Tasks",
data:data,
backgroundColor:"#00ffae"
}]
}

});

}

display();

</script>

</body>
</html>
