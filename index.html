<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart To-Do List</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(-45deg,#667eea,#764ba2,#ff7eb3,#42e695,#f9d423);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:520px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
color:white;
}

h1{
text-align:center;
margin-bottom:8px;
}

.quote{
text-align:center;
opacity:0.85;
margin-bottom:25px;
font-style:italic;
}

.inputBox{
display:flex;
gap:8px;
margin-bottom:15px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00c9a7;
color:white;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.25);
padding:10px;
border-radius:8px;
margin-top:8px;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.today{
border-left:4px solid #00ffae;
}

.progress{
height:8px;
background:rgba(255,255,255,0.3);
border-radius:5px;
margin-top:15px;
}

.progressBar{
height:8px;
background:#00ffae;
width:0%;
border-radius:5px;
transition:0.4s;
}

.counter{
margin-top:6px;
font-size:14px;
}

.calendar{
margin-top:20px;
background:rgba(255,255,255,0.2);
padding:12px;
border-radius:10px;
}

.chartBox{
margin-top:20px;
}

.deleteBtn{
background:#ff4d6d;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.deleteBtn:hover{
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>Smart To-Do List</h1>

<div class="quote">
Stay consistent. Small tasks lead to big success.
</div>

<div class="inputBox">

<input id="taskInput" placeholder="Enter your task">

<input type="date" id="taskDate">

<button onclick="addTask()">Add</button>

</div>

<div class="progress">

<div class="progressBar" id="progressBar"></div>

</div>

<div class="counter" id="taskCounter"></div>

<div id="taskList"></div>

<div class="calendar">

<h3>📅 Task Calendar</h3>

<div id="calendarView"></div>

</div>

<div class="chartBox">

<h3>📊 Weekly Productivity</h3>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

if(Notification.permission !== "granted"){
Notification.requestPermission();
}

function notify(message){

if(Notification.permission==="granted"){
new Notification("Task Reminder",{body:message});
}

}

function addTask(){

let text=document.getElementById("taskInput").value;
let date=document.getElementById("taskDate").value;

if(text==="")return;

tasks.push({
text,
date,
completed:false
});

save();

display();

document.getElementById("taskInput").value="";

}

function toggle(i){

tasks[i].completed=!tasks[i].completed;

save();

display();

}

function del(i){

tasks.splice(i,1);

save();

display();

}

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks));

}

function updateProgress(){

let done=tasks.filter(t=>t.completed).length;

let percent=tasks.length?done/tasks.length*100:0;

document.getElementById("progressBar").style.width=percent+"%";

document.getElementById("taskCounter").innerText=
done+" / "+tasks.length+" tasks completed";

}

function renderCalendar(){

let html="";

tasks.forEach(t=>{
html+=`<div>${t.date} → ${t.text}</div>`;
});

document.getElementById("calendarView").innerHTML=html;

}

let chart;

function renderChart(){

let data=[0,0,0,0,0,0,0];

tasks.forEach(t=>{
if(t.completed && t.date){
let day=new Date(t.date).getDay();
data[day]++;
}
});

if(chart)chart.destroy();

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
datasets:[{
label:"Completed Tasks",
data:data,
backgroundColor:"#00ffae"
}]
}

});

}

function checkDeadline(){

let today=new Date().toISOString().split("T")[0];

tasks.forEach(t=>{
if(t.date && t.date<=today && !t.completed){
notify("Deadline reached: "+t.text);
}
});

}

setInterval(checkDeadline,60000);

function display(){

let list=document.getElementById("taskList");

list.innerHTML="";

let today=new Date().toISOString().split("T")[0];

tasks.forEach((t,i)=>{

let div=document.createElement("div");

div.className="task";

if(t.date===today)div.classList.add("today");

let left=document.createElement("div");

let check=document.createElement("input");

check.type="checkbox";

check.checked=t.completed;

check.onclick=()=>toggle(i);

let span=document.createElement("span");

span.innerHTML=" "+t.text+" ("+t.date+")";

if(t.completed)span.classList.add("completed");

left.appendChild(check);

left.appendChild(span);

let delBtn=document.createElement("button");

delBtn.innerText="Delete";

delBtn.className="deleteBtn";

delBtn.onclick=()=>del(i);

div.appendChild(left);

div.appendChild(delBtn);

list.appendChild(div);

});

updateProgress();

renderCalendar();

renderChart();

}

display();

</script>

</body>
</html>
